foundry:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('HOME') }}/.local/share/foundry/lake/silver/finance.duckdb"
      extensions:
        - vss
      threads: 4
    prod:
      type: duckdb
      path: /var/lib/foundry/lake/silver/finance.duckdb
      extensions:
        - vss
      threads: 4
