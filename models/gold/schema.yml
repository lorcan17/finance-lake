version: 2

models:
  - name: net_worth_daily
    description: "Daily net worth: total assets minus liabilities."
    columns:
      - name: as_of_date
        tests: [unique, not_null]
      - name: net_worth
        tests: [not_null]

  - name: spending_by_category
    description: "Monthly spend per category. Transfers excluded once matching lands."
    columns:
      - name: month
        tests: [not_null]
      - name: category_id
        tests: [not_null]
