version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: questrade_snapshots
        description: "Daily position/balance snapshots from Questrade API. Grain: account × symbol × date."
      - name: bank_statements
        description: "Bank statement headers — one row per parsed PDF (or per sub-account for multi-account statements). Holds metadata, header totals, validation_issues, ingestion provenance."
      - name: cc_statements
        description: "Credit card statement headers — one row per parsed PDF."
      - name: bank_transactions
        description: "Bank statement detail lines. Grain: statement × posting_date × amount × raw_description. FK statement_sha256 → bank_statements."
      - name: cc_transactions
        description: "Credit card statement detail lines. Grain: statement × txn_date × amount × raw_description. FK statement_sha256 → cc_statements."

  - name: embed_enrich
    schema: silver
    description: "Tables written directly by the embed_enrich Python service (rule-pass + LLM-embedding merchant categorisation). Source-of-truth for merchant rows; dbt re-exposes them in main_silver via passthrough views."
    tables:
      - name: dim_merchants
        description: "Canonical merchants with category_id and OpenAI embeddings. Populated by embed_enrich; one row per (canonical_name)."
      - name: merchant_review_queue
        description: "Borderline / unmatched merchants needing human review."
