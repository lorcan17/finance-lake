version: 2

models:
  - name: dim_accounts
    description: "Unified account dimension across Questrade, bank, and credit card sources."
    columns:
      - name: account_id
        tests: [not_null]
      - name: friendly_name
        description: "Human-readable name for the account."
      - name: inversion_factor
        description: "Multiplier to normalise transaction signs (1 or -1)."
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['questrade', 'bank', 'credit_card']

  - name: dim_merchants
    description: "Canonical merchant dimension with OpenAI embeddings. Populated by embed_enrich."
    columns:
      - name: merchant_id
        tests: [unique, not_null]

  - name: fact_transactions
    description: "All money movements across bank + credit card sources. One row per txn."
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: account_id
        tests: [not_null]
      - name: amount
        description: "Normalised amount (negative = spend, positive = income)."
      - name: clean_description
        description: "Lowercase, alphanumeric-only description for matching."

  - name: fact_transfers
    description: "Matched internal transfers (CC payments, savings)."
    columns:
      - name: transaction_id
        tests: [not_null]
      - name: matched_transaction_id
        description: "ID of the matched transaction (null for external transfers)"
